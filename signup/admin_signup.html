<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(2, 22, 6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: darkgrey;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .explain {
            font-size: 1rem;
            font-family: serif;
            color: rgb(193, 170, 140);
            margin-top: 5px;
        }

        form {
            background-color: silver;
            padding: 40px 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px; /* Bituma itaba nini birenze kuri mudasobwa */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid rgb(255, 255, 255);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        label {
            color: black;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        input {
            height: 45px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #999;
            padding: 0 15px;
            width: 100%;
            outline: none;
        }

        input:hover {
            border: 2px solid black;
        }

        button {
            width: 100%;
            height: 50px;
            background-color: black;
            color: darkkhaki;
            font-size: 1.2rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            box-shadow: 1px 2px 5px rgba(16, 82, 2, 0.5);
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: rgb(34, 30, 30);
            color: aliceblue;
        }

        .back {
            text-align: center;
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #222;
            font-size: 1rem;
        }

        .back:hover {
            text-decoration: underline;
            color: #820000;
        }

        /* --- MEDIA QUERIES KURI TELEFONE --- */
        @media (max-width: 600px) {
            form {
                padding: 25px 15px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    
    <section class="content">
        <h1>Teacher Sign Up Portal
            <p class="explain">You have to sign up to create an account</p>
        </h1>

        <form id="teacherloginform">
            <div class="input-group">
                <label>Username:</label>
                <input type="text" name="username" placeholder="Enter your Name" id="username">
            </div>

            <div class="input-group">
                <label>Password:</label>
                <input type="password" name="password" placeholder="Enter your Password" id="password">
            </div>

            <div class="input-group">
                <label>Confirm Password:</label>
                <input type="password" placeholder="Confirm your Password" id="confirmpassword">
            </div>

            <button type="submit">Sign Up</button>
            <a href="../index.html" class="back">Back to Home</a>
        </form>
    </section>

    <script>
        const form = document.getElementById('teacherloginform');
        
        form.addEventListener('submit', function(event) {
            const username = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmpassword').value;

            if (username.trim() === "" || pass === "" || confirmPass === "") {
                event.preventDefault();
                alert("All fields are required! Please fill in all the fields.");
                return;
            }

            if (pass !== confirmPass) {
                event.preventDefault(); 
                alert("Your passwords don't match! Please confirm your password correctly.");
            } else {
                alert("Registration Successful! Thank you, " + username);
            }
        });
    </script>
</body>
</html>
