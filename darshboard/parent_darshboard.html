<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal - Dark Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            /* Dark Mode Palette */
            --bg-dark: #0f172a;       /* Deep Navy Background */
            --card-dark: #1e293b;     /* Lighter Slate for Cards */
            --text-bright: #f8fafc;   /* Almost White */
            --text-dim: #94a3b8;      /* Muted Gray Text */
            --accent-blue: #38bdf8;   /* Electric Blue */
            --accent-glow: rgba(56, 189, 248, 0.2);
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
        }

        *{ margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-bright); line-height: 1.6; }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-size: 1.3rem; font-weight: 700; color: var(--accent-blue); letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* --- HEADER SECTION --- */
        .parent-header {
            background: var(--card-dark);
            padding: 30px; border-radius: 20px;
            display: flex; align-items: center; gap: 25px; margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .student-avatar {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .student-info h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .student-info p { color: var(--text-dim); font-size: 0.9rem; }

        /* --- DASHBOARD STATS --- */
        .p-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .p-card {
            background: var(--card-dark); padding: 25px; border-radius: 20px;
            text-align: center; border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }
        .p-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
        .p-card i { font-size: 1.5rem; color: var(--accent-blue); margin-bottom: 15px; }
        .p-card h3 { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
        .p-card .val { font-size: 2rem; font-weight: 800; color: var(--text-bright); margin-top: 10px; }

        /* --- MAIN CONTENT LAYOUT --- */
        .content-wrap { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        
        .section-title {
            font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            color: var(--accent-blue);
        }

        .dark-box { 
            background: var(--card-dark); padding: 30px; border-radius: 20px; 
            border: 1px solid var(--border);
        }

        /* --- DATA TABLE --- */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        
        .badge {
            padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700;
        }
        .pass { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .fail { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* --- NOTICES --- */
        .notice-item {
            padding: 15px 0; border-bottom: 1px solid var(--border);
        }
        .notice-item:last-child { border: none; }
        .notice-item small { color: var(--accent-blue); font-weight: 600; }
        .notice-item h4 { margin: 5px 0; font-size: 1rem; }
        .notice-item p { font-size: 0.85rem; color: var(--text-dim); }

        /* --- BUTTONS --- */
        .btn-action {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px;
            border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-primary { background: var(--accent-blue); color: var(--bg-dark); }
        .btn-primary:hover { background: #7dd3fc; box-shadow: 0 0 15px var(--accent-glow); }
        
        .btn-outline { background: transparent; color: var(--text-bright); border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--border); }

        @media (max-width: 850px) {
            .content-wrap, .p-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-brand"><i class="fas fa-fingerprint"></i> PARENT PORTAL</div>
        <div style="color: var(--text-dim);">
            <i class="far fa-bell" style="margin-right: 20px;"></i>
            <i class="far fa-user-circle fa-lg"></i>
        </div>
    </nav>

    <div class="container">
        <div class="parent-header">
            <div class="student-avatar">
                <i class="fas fa-user-ninja"></i>
            </div>
            <div class="student-info">
                <p>Welcome, Parent of</p>
                <h1 id="p-child-name">Loading...</h1>
                <p><i class="fas fa-microchip"></i> STEM Excellence Academy | Year 2026</p>
            </div>
        </div>

        <div class="p-grid">
            <div class="p-card">
                <i class="fas fa-bolt"></i>
                <h3>Term Average</h3>
                <div class="val" id="p-avg">0%</div>
            </div>
            <div class="p-card">
                <i class="far fa-calendar-check"></i>
                <h3>Attendance</h3>
                <div class="val" style="color: var(--success);">98.2%</div>
            </div>
            <div class="p-card">
                <i class="fas fa-trophy"></i>
                <h3>Rank</h3>
                <div class="val">02 <span style="font-size: 1rem; color: var(--text-dim);">/ 45</span></div>
            </div>
        </div>

        <div class="content-wrap">
            <div class="dark-box">
                <h2 class="section-title"><i class="fas fa-chart-pie"></i> Performance Analytics</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Score</th>
                            <th>Status</th>
                            <th>Remark</th>
                        </tr>
                    </thead>
                    <tbody id="p-marks-body"></tbody>
                </table>
            </div>

            <div>
                <div class="dark-box">
                    <h2 class="section-title"><i class="far fa-bell"></i> Latest Updates</h2>
                    <div id="p-ann-list"></div>
                </div>

                <div class="dark-box" style="margin-top: 25px; border-top: 4px solid var(--accent-blue);">
                    <h3 style="margin-bottom: 10px;">Quick Support</h3>
                    <p style="font-size: 0.8rem; color: var(--text-dim);">Get direct access to your child's mentors.</p>
                    <button class="btn-action btn-primary">Message Class Mentor</button>
                    <button class="btn-action btn-outline">Request Meeting</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadParentData() {
            const marks = JSON.parse(localStorage.getItem('sc_marks')) || [];
            const anns = JSON.parse(localStorage.getItem('sc_ann')) || [];

            // Calculate Avg
            const avg = marks.length > 0 ? (marks.reduce((a,b)=>a+b.score, 0)/marks.length).toFixed(1) : 0;
            document.getElementById('p-avg').innerText = avg + "%";

            // Child Name
            if(marks.length > 0) {
                document.getElementById('p-child-name').innerText = marks[0].name;
            }

            // Marks Table
            const marksBody = document.getElementById('p-marks-body');
            marksBody.innerHTML = marks.map(m => `
                <tr>
                    <td><b style="color: var(--text-bright)">${m.name}</b></td>
                    <td><span style="color: var(--accent-blue); font-weight: 700;">${m.score}%</span></td>
                    <td><span class="badge ${m.score >= 50 ? 'pass' : 'fail'}">${m.score >= 50 ? 'OPTIMAL' : 'CRITICAL'}</span></td>
                    <td style="color: var(--text-dim); font-size: 0.8rem italic">
                        ${m.score >= 80 ? 'Mastery Level' : m.score >= 50 ? 'On Track' : 'Urgent Intervention'}
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="4" style="text-align:center; padding: 30px;">Waiting for data sync...</td></tr>';

            // Announcements
            const annList = document.getElementById('p-ann-list');
            annList.innerHTML = anns.slice(0, 3).map(a => `
                <div class="notice-item">
                    <small>${a.date}</small>
                    <h4>${a.title}</h4>
                    <p>${a.msg.substring(0, 80)}...</p>
                </div>
            `).join('') || '<p style="color: var(--text-dim)">No system alerts.</p>';
        }

        window.onload = loadParentData;
    </script>
</body>
</html>
